<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSwap Campus - Iniciar Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="auth-styles.css">
</head>
<body>
    <div class="auth-container">
        <!-- Background orbs -->
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>

        <!-- Logo -->
        <div class="logo-header">
            <div class="logo-icon">
                <svg viewBox="0 0 40 40" fill="none">
                    <circle cx="20" cy="20" r="18" fill="url(#logoGradient)"/>
                    <path d="M15 20L18 23L25 16" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="logoGradient" x1="0" y1="0" x2="40" y2="40">
                            <stop offset="0%" stop-color="#A78BFA"/>
                            <stop offset="100%" stop-color="#EC4899"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <span class="logo-text">SkillSwap Campus</span>
        </div>

        <!-- Auth Card -->
        <div class="auth-card" id="authCard">
            <!-- Login Form -->
            <div class="form-container active" id="loginForm">
                <h2 class="form-title">Bienvenido de vuelta</h2>
                <p class="form-subtitle">Ingresa tus credenciales para continuar</p>

                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginEmail">Código de estudiante</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                                <path d="M10 10C12.7614 10 15 7.76142 15 5C15 2.23858 12.7614 0 10 0C7.23858 0 5 2.23858 5 5C5 7.76142 7.23858 10 10 10Z" fill="currentColor"/>
                                <path d="M10 12C4.47715 12 0 14.4772 0 17.5C0 18.3284 0.671573 19 1.5 19H18.5C19.3284 19 20 18.3284 20 17.5C20 14.4772 15.5228 12 10 12Z" fill="currentColor"/>
                            </svg>
                            <input type="text" id="loginEmail" placeholder="U202XXXXXX" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">Contraseña</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                                <path d="M15 7H14V5C14 2.24 11.76 0 9 0C6.24 0 4 2.24 4 5V7H3C1.9 7 1 7.9 1 9V17C1 18.1 1.9 19 3 19H15C16.1 19 17 18.1 17 17V9C17 7.9 16.1 7 15 7ZM9 14C7.9 14 7 13.1 7 12C7 10.9 7.9 10 9 10C10.1 10 11 10.9 11 12C11 13.1 10.1 14 9 14ZM11.1 7H6.9V5C6.9 3.29 8.29 1.9 10 1.9C11.71 1.9 13.1 3.29 13.1 5V7H11.1Z" fill="currentColor"/>
                            </svg>
                            <input type="password" id="loginPassword" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">
                        <span>Iniciar Sesión</span>
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M7.5 15L12.5 10L7.5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </form>

                <div class="form-divider">
                    <span>¿No tienes cuenta?</span>
                </div>

                <button class="btn btn-ghost btn-full" onclick="switchToRegister()">
                    Crear cuenta nueva
                </button>
            </div>

            <!-- Register Form -->
            <div class="form-container" id="registerForm">
                <h2 class="form-title">Únete a SkillSwap</h2>
                <p class="form-subtitle">Crea tu cuenta y comienza a intercambiar habilidades</p>

                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="registerName">Nombre completo</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                                <path d="M10 10C12.7614 10 15 7.76142 15 5C15 2.23858 12.7614 0 10 0C7.23858 0 5 2.23858 5 5C5 7.76142 7.23858 10 10 10Z" fill="currentColor"/>
                                <path d="M10 12C4.47715 12 0 14.4772 0 17.5C0 18.3284 0.671573 19 1.5 19H18.5C19.3284 19 20 18.3284 20 17.5C20 14.4772 15.5228 12 10 12Z" fill="currentColor"/>
                            </svg>
                            <input type="text" id="registerName" placeholder="Juan Pérez García" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="registerCode">Código de universidad</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                                <path d="M17 4H3C1.9 4 1 4.9 1 6V14C1 15.1 1.9 16 3 16H17C18.1 16 19 15.1 19 14V6C19 4.9 18.1 4 17 4ZM17 14H3V6H17V14ZM5 8H15V10H5V8Z" fill="currentColor"/>
                            </svg>
                            <input type="text" id="registerCode" placeholder="U202XXXXXX" required pattern="U\d{9}" title="Formato: U seguido de 9 dígitos">
                        </div>
                        <small class="input-hint">Formato: U202XXXXXX</small>
                    </div>

                    <div class="form-group">
                        <label for="registerPassword">Contraseña</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                                <path d="M15 7H14V5C14 2.24 11.76 0 9 0C6.24 0 4 2.24 4 5V7H3C1.9 7 1 7.9 1 9V17C1 18.1 1.9 19 3 19H15C16.1 19 17 18.1 17 17V9C17 7.9 16.1 7 15 7ZM9 14C7.9 14 7 13.1 7 12C7 10.9 7.9 10 9 10C10.1 10 11 10.9 11 12C11 13.1 10.1 14 9 14ZM11.1 7H6.9V5C6.9 3.29 8.29 1.9 10 1.9C11.71 1.9 13.1 3.29 13.1 5V7H11.1Z" fill="currentColor"/>
                            </svg>
                            <input type="password" id="registerPassword" placeholder="••••••••" required minlength="6">
                        </div>
                        <small class="input-hint">Mínimo 6 caracteres</small>
                    </div>

                    <div class="form-group">
                        <label for="registerSkills">Tus habilidades principales</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                                <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="currentColor"/>
                            </svg>
                            <input type="text" id="registerSkills" placeholder="Diseño, Programación, Marketing..." required>
                        </div>
                        <small class="input-hint">Separa con comas</small>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">
                        <span>Crear cuenta</span>
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M7.5 15L12.5 10L7.5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </form>

                <div class="form-divider">
                    <span>¿Ya tienes cuenta?</span>
                </div>

                <button class="btn btn-ghost btn-full" onclick="switchToLogin()">
                    Iniciar sesión
                </button>
            </div>
        </div>

        <!-- Success Toast -->
        <div class="toast" id="successToast">
            <div class="toast-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="10" fill="url(#successGradient)"/>
                    <path d="M8 12L11 15L16 9" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="successGradient" x1="0" y1="0" x2="24" y2="24">
                            <stop offset="0%" stop-color="#34D399"/>
                            <stop offset="100%" stop-color="#10B981"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <div class="toast-content">
                <div class="toast-title" id="toastTitle">¡Éxito!</div>
                <div class="toast-message" id="toastMessage">Operación completada</div>
            </div>
        </div>
    </div>

    <script src="auth-script.js"></script>
</body>
</html>
